#### DS10U ###############################################
# Fully automated Debian install - no monitor needed
# Generated from NixOS config (disko: single /dev/sda, GPT, ESP + ext4)
##########################################################

# Locale
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i console-setup/ask_detect boolean false

# Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string ds10u
d-i netcfg/get_domain string krugten.org
d-i netcfg/wireless_wep string
d-i hw-detect/load_firmware boolean true

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Amsterdam
d-i clock-setup/ntp boolean true

# Partitioning - single disk, whole disk, ext4
# Matches: /dev/sda GPT, 512M ESP vfat /boot, rest ext4 /
d-i partman-auto/method string regular
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe string atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-basicfilesystems/confirm_nooverwrite boolean true

# Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_boolean true
d-i grub-installer/bootdev string /dev/sda

# User
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Server Admin
d-i passwd/username string admin
d-i passwd/user-password-crypted password $6$dJvII0F7leajEKlf$wojhyv5fWFewjMRyVB/2.DHqLb5MTojasbl8JoAVOCjbiT.MuRuiAsQ4Ya.xQg0ItfPd9TE7uFnLaUH5apW/8.

# No root password
d-i passwd/root-password-crypted password *

# Packages
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org
d-i apt-setup/contrib boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/non-free-firmware boolean true
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string sudo curl wget git vim htop ca-certificates gnupg lsb-release
d-i pkgsel/upgrade string full-upgrade

# Firmware
d-i hd-detection/firmware boolean true

# Finish
d-i finish-install/reboot_in_progress note

# Late command - add admin to sudo
d-i preseed/late_command string \
    in-target sh -c 'echo "admin ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/admin' ; \
    in-target chmod 440 /etc/sudoers.d/admin
