---
- name: Fix kubeconfig permissions
  file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: "0644"
  tags: k8s

- name: Copy kubeconfig to admin user
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ admin_username }}/.kube/config"
    owner: "{{ admin_username }}"
    group: "{{ admin_group }}"
    mode: "0600"
    remote_src: yes
  tags: k8s

- name: Copy Kubernetes manifests to target host
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../kubernetes-manifests/"
    dest: "/home/{{ admin_username }}/kubernetes-manifests/"
    delete: yes
  tags:
    - k8s
    - manifests

- name: Create data directories for hostPath volumes
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/pihole/etc
    - /var/lib/pihole/dnsmasq
    - /var/lib/home-assistant
    - /var/lib/home-assistant/custom_components
    - /var/lib/vaultwarden
    - /var/lib/homepage
    - /var/lib/tuliprox/config
    - /run/secrets/rendered
  tags:
    - k8s
    - storage

- name: Create all required namespaces
  shell: |
    set -o pipefail
    kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
  changed_when: false
  loop:
    - cert-manager
    - home-assistant
    - vaultwarden
    - pihole
    - homepage
    - mealie
    - kuma
    - tuliprox
    - metallb-system
    - external-dns
    - books
    - media
    - paperless
  tags:
    - k8s
    - namespaces

- name: Apply cert-manager
  shell: |
    kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.yaml
  register: cm_result
  changed_when: "'created' in cm_result.stdout"
  failed_when: false
  tags:
    - k8s
    - cert-manager

- name: Wait for cert-manager to be ready
  shell: |
    set -o pipefail
    kubectl -n cert-manager wait --for=condition=Available deployment/cert-manager --timeout=180s
    kubectl -n cert-manager wait --for=condition=Available deployment/cert-manager-webhook --timeout=180s
  changed_when: false
  failed_when: false
  tags:
    - k8s
    - cert-manager

- name: Create Cloudflare API token secrets
  shell: |
    set -o pipefail
    kubectl create secret generic cloudflare-api-token \
      --namespace={{ item }} \
      --from-literal=api-token={{ vault_cloudflare_api_token }} \
      --dry-run=client -o yaml | kubectl apply -f -
  changed_when: false
  loop:
    - cert-manager
    - external-dns
    - home-assistant
    - pihole
    - tuliprox
    - homepage
    - mealie
    - kuma
    - books
    - media
    - paperless
  tags:
    - k8s
    - secrets

- name: Apply ClusterIssuer
  command: kubectl apply -f "/home/{{ admin_username }}/kubernetes-manifests/cert-manager/cluster-issuer.yml"
  register: ci_result
  changed_when: "'created' in ci_result.stdout"
  tags:
    - k8s
    - cert-manager

- name: Apply nginx-ingress
  command: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.4/deploy/static/provider/cloud/deploy.yaml
  register: ing_result
  changed_when: "'created' in ing_result.stdout"
  failed_when: false
  tags:
    - k8s
    - ingress

- name: Wait for nginx-ingress controller to be ready
  shell: |
    kubectl -n ingress-nginx wait --for=condition=Available deployment/ingress-nginx-controller --timeout=180s
  changed_when: false
  failed_when: false
  tags:
    - k8s
    - ingress

- name: Apply MetalLB
  shell: |
    kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.9/config/manifests/metallb-native.yaml
  register: mlb_result
  changed_when: "'created' in mlb_result.stdout"
  failed_when: false
  tags:
    - k8s
    - metallb

- name: Wait for MetalLB to be ready
  shell: |
    kubectl -n metallb-system wait --for=condition=Available deployment/controller --timeout=180s
  changed_when: false
  failed_when: false
  tags:
    - k8s
    - metallb

- name: Apply MetalLB IPPool
  command: kubectl apply -f /home/{{ admin_username }}/kubernetes-manifests/metallb/ippool.yml
  register: ippool_result
  changed_when: "'created' in ippool_result.stdout"
  tags:
    - k8s
    - metallb

- name: Apply external-dns
  command: kubectl apply -f /home/{{ admin_username }}/kubernetes-manifests/external-dns/external-dns.yml
  register: edns_result
  changed_when: "'created' in edns_result.stdout"
  tags:
    - k8s
    - dns
