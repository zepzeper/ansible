---
- name: Install server packages
  apt:
    name: "{{ server_packages }}"
    state: present
  tags: bootstrap

- name: Harden SSH - disable password auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: restart sshd
  tags: ssh

- name: Harden SSH - enable pubkey auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PubkeyAuthentication"
    line: "PubkeyAuthentication yes"
    state: present
  notify: restart sshd
  tags: ssh

- name: Harden SSH - disable challenge-response
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?ChallengeResponseAuthentication"
    line: "ChallengeResponseAuthentication no"
    state: present
  notify: restart sshd
  tags: ssh

###############################################################################
# Firewall
###############################################################################

- name: Install iptables and persistency tools
  apt:
    name:
      - iptables
      - iptables-persistent
    state: present
  tags: firewall

- name: Ensure iptables directory exists
  file:
    path: /etc/iptables
    state: directory
    mode: "0755"
  tags: firewall

- name: Deploy base IPv4 rules
  template:
    src: iptables-rules.v4.j2
    dest: /etc/iptables/rules.v4
    mode: "0644"
  notify: restore iptables
  tags: firewall

- name: Deploy base IPv6 rules
  template:
    src: iptables-rules.v6.j2
    dest: /etc/iptables/rules.v6
    mode: "0644"
  notify: restore iptables
  tags: firewall

- name: Enable netfilter-persistent service
  systemd:
    name: netfilter-persistent
    enabled: yes
  tags: firewall

###############################################################################
# sysctl tuning (Kubernetes prerequisites)
###############################################################################

- name: Configure sysctl for Kubernetes
  template:
    src: 99-kubernetes.conf.j2
    dest: /etc/sysctl.d/99-kubernetes.conf
    mode: "0644"
  tags: sysctl

- name: Apply sysctl settings
  command: sysctl --system
  changed_when: false
  tags: sysctl

- name: Load kernel module for bridge filtering
  community.general.modprobe:
    name: br_netfilter
    state: present
  tags: sysctl

###############################################################################
# Disable swap (required for kubelet)
###############################################################################

- name: Disable swap immediately
  command: swapoff -a
  changed_when: false
  when: ansible_facts['swaptotal_mb'] > 0
  tags: system

- name: Remove swap from fstab
  ansible.posix.mount:
    name: "{{ item }}"
    fstype: swap
    state: absent
  loop: "{{ ansible_facts['mounts'] | selectattr('fstype', 'equalto', 'swap') | map(attribute='mount') | list }}"
  when: ansible_facts['mounts'] | selectattr('fstype', 'equalto', 'swap') | list | length > 0
  tags: system

###############################################################################
# Journald log limits
###############################################################################

- name: Configure journald log limits
  template:
    src: journald.conf.j2
    dest: /etc/systemd/journald.conf
    mode: "0644"
  notify: restart journald
  tags: system

###############################################################################
# Unattended-upgrades (security updates only)
###############################################################################

- name: Install unattended-upgrades
  apt:
    name: unattended-upgrades
    state: present
  tags: system

- name: Deploy unattended-upgrades config
  template:
    src: 50-unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50-unattended-upgrades
    mode: "0644"
  tags: system

- name: Enable periodic unattended-upgrades
  copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
  tags: system

###############################################################################
# Disable unwanted services
###############################################################################

- name: Disable unwanted services
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
    masked: yes
  failed_when: false
  loop:
    - bluetooth
    - pipewire
    - pipewire-pulse
    - wireplumber
  tags: bootstrap
