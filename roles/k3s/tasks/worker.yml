---
- name: Install k3s dependencies
  apt:
    name:
      - curl
      - iptables
      - conntrack
    state: present
    update_cache: yes
  tags:
    - k3s
    - kubernetes

- name: Download k3s install script
  get_url:
    url: https://get.k3s.io
    dest: /usr/local/bin/k3s-install.sh
    mode: "0755"
  tags:
    - k3s
    - kubernetes

- name: Install k3s agent
  environment:
    INSTALL_K3S_EXEC: "agent"
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    K3S_URL: "https://{{ hostvars[groups['k3s_master'][0]]['ansible_host'] }}:6443"
    K3S_TOKEN: "{{ vault_k3s_token }}"
  shell: |
    /usr/local/bin/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s
  tags:
    - k3s
    - kubernetes

- name: Allow k3s worker TCP ports
  ansible.posix.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ item }}"
    jump: ACCEPT
    state: present
  loop: "{{ k3s_worker_tcp_ports }}"
  register: k3s_iptables_tcp_rules
  notify: restore iptables
  tags:
    - k3s
    - firewall

- name: Allow k3s worker UDP ports
  ansible.posix.iptables:
    chain: INPUT
    protocol: udp
    destination_port: "{{ item }}"
    jump: ACCEPT
    state: present
  loop: "{{ k3s_worker_udp_ports }}"
  register: k3s_iptables_udp_rules
  notify: restore iptables
  tags:
    - k3s
    - firewall

- name: Persist iptables rules
  shell: iptables-save > /etc/iptables/rules.v4
  when: k3s_iptables_tcp_rules is changed or k3s_iptables_udp_rules is changed
  tags:
    - k3s
    - firewall
