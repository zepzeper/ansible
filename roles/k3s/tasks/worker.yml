---
- name: Install k3s dependencies
  apt:
    name:
      - curl
      - iptables
      - conntrack
    state: present
    update_cache: yes

- name: Download k3s install script
  get_url:
    url: https://get.k3s.io
    dest: /usr/local/bin/k3s-install.sh
    mode: "0755"

- name: Install k3s agent
  environment:
    INSTALL_K3S_EXEC: "agent"
    K3S_URL: "https://{{ groups['k3s_master'][0] }}:6443"
    K3S_TOKEN: "{{ vault_k3s_token }}"
  shell: |
    /usr/local/bin/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s

- name: Add k3s worker firewall rules
  shell: |
    set -e
    for port in {{ k3s_worker_tcp_ports | join(" ") }}; do
      iptables -C INPUT -p tcp --dport $port -j ACCEPT 2>/dev/null || \
        iptables -A INPUT -p tcp --dport $port -j ACCEPT
    done
    for port in {{ k3s_worker_udp_ports | join(" ") }}; do
      iptables -C INPUT -p udp --dport $port -j ACCEPT 2>/dev/null || \
        iptables -A INPUT -p udp --dport $port -j ACCEPT
    done
    iptables-save > /etc/iptables/rules.v4
  notify: restore iptables
