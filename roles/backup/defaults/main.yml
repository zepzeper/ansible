---
backup_enabled: true
backup_user: "{{ admin_username }}"
backup_group: "{{ admin_group }}"
backup_dir: /var/backups
restic_repo: /var/backups/restic
restic_password: ""
restic_retention:
  keep_last: 7
  keep_daily: 30
  keep_weekly: 12
  keep_monthly: 6
backup_schedule: daily
backup_time: "02:00"
backup_paths:
  - /var/lib/pihole
  - /var/lib/home-assistant
  - /var/lib/vaultwarden
  - /var/lib/homepage
  - /var/lib/tuliprox
  - /run/secrets/rendered
