---
- name: Bootstrap servers
  hosts: all
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

  roles:
    - common
    - server

  post_tasks:
    - name: Reboot if kernel updated
      reboot:
        reboot_timeout: 300
        pre_reboot_delay: 30
      when: ansible_facts.packages['linux-image-amd64'] is defined
      ignore_errors: yes
